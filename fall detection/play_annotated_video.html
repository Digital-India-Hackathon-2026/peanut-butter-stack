<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annotated Fall Video</title>
  <style>
    body { margin: 0; background: #060b16; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; }
    video { max-width: 90vw; max-height: 80vh; border: 2px solid #1e293b; border-radius: 12px; background: #000; }
    .caption { margin-top: 16px; font-family: sans-serif; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <video controls autoplay muted loop>
      <source src="annotated_fall.mp4" type="video/mp4" />
      Your browser does not support HTML5 video.
    </video>
    <p class="caption">Annotated fall detection video from <strong>annotated_fall.mp4</strong>.</p>
  </div>
</body>
</html>
